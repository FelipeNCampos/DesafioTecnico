<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ app_name|default("Estoque X") }}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body border-bottom sticky-top">
        <div class="container-fluid px-3 px-lg-4">
            <a class="navbar-brand fw-semibold" href="{{ url_for('web.index') }}">{{ app_name|default("Estoque X") }}</a>
            <div class="ms-auto d-flex align-items-center gap-2">
                <span id="navUserBadge" class="badge text-bg-light d-none"></span>
                <button id="logoutButton" class="btn btn-outline-secondary btn-sm d-none" type="button">Sair</button>
            </div>
        </div>
    </nav>

    <main class="container-fluid px-3 px-lg-4 py-4">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
