services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: estoque-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/1433' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: estoque-api
    environment:
      SECRET_KEY: "${SECRET_KEY}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
      JWT_ACCESS_TOKEN_EXPIRES_MINUTES: "${JWT_ACCESS_TOKEN_EXPIRES_MINUTES:-60}"
      DATABASE_URL: "mssql+pyodbc://sa:${SA_PASSWORD}@db:1433/master?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  sqlserver_data:
